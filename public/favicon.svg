<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#8B9D77"/>

  <!-- Left ring -->
  <circle cx="24" cy="32" r="11" stroke="#F5E6D8" stroke-width="4" fill="none"/>
  <!-- Left ring top shine -->
  <circle cx="24" cy="32" r="11" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Right ring (overlapping) -->
  <circle cx="40" cy="32" r="11" stroke="#F5E6D8" stroke-width="4" fill="none"/>
  <!-- Right ring top shine -->
  <circle cx="40" cy="32" r="11" stroke="white" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Small diamond on left ring -->
  <polygon points="24,18 26,22 24,24 22,22" fill="#F5E6D8" opacity="0.9"/>

  <!-- Small diamond on right ring -->
  <polygon points="40,18 42,22 40,24 38,22" fill="#F5E6D8" opacity="0.9"/>
</svg>
